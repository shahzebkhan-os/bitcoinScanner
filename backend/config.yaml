pair: "BTCUSDT"  # Using BTCUSDT for accurate ticker price. Fallback to B-BTC_USDT for candles.
interval: "1m"
candle_buffer_size: 200
poll_interval_seconds: 1

min_votes: 3

alerts:
  terminal: true
  desktop: true
  telegram: false
  websocket: true

websocket:
  host: "0.0.0.0"
  port: 8765

telegram:
  bot_token: ""
  chat_id: ""

indicators:
  ema_fast: 9
  ema_slow: 21
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  vwap_reset: "daily"

risk:
  max_leverage: 5
  risk_per_trade_pct: 1.0
